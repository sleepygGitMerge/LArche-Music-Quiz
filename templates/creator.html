<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Quiz Creator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        body { padding-top: 30px; }
        .card { padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; background: var(--card-background-color); }
        .yt-box { background: rgba(255,0,0,0.05); padding: 15px; border-radius: 5px; border-left: 4px solid red; margin-bottom: 15px; }
        /* Hide the test player */
        #yt-test-container { position: absolute; width: 0; height: 0; overflow: hidden; top: -9999px; left: -9999px; }
    </style>
</head>
<body>
    <div id="yt-test-container"></div>

    <main class="container">
        <nav>
            <ul><li><strong>🛠️ Kreator Quizów</strong></li></ul>
            <ul><li><a href="/" role="button" class="outline">Powrót na stronę główną</a></li></ul>
        </nav>

        <div class="card">
            <h3>1. Stwórz nowy quiz</h3>
            <form id="create-quiz-form">
                <input type="text" id="quiz-name" placeholder="E.g., 80s Rock Hits" required>
                <button type="submit">Utwórz quiz</button>
            </form>
            <p id="quiz-msg" style="color: green;"></p>
        </div>

        <div class="card">
             <h3>2. Dodaj pytania do quizu</h3>
            <form id="add-question-form">
                <label>Wybierz Quiz:
                    <select name="quiz_id" id="quiz-select" required></select>
                </label>

                <label>Treść Pytania:
                    <input type="text" name="question_text" placeholder="E.g., Nazwij tę piostenkę!" required>
                </label>


                <div class="grid">
                     <label>Dodatkowe media:
                        <select name="media_type" id="media-type" required>
                            <option value="none">Nic (tylko tekst)</option>
                            <option value="image">Obrazek</option>
                            <option value="video">Filmik</option>
                        </select>
                    </label>
                    <label>Wgraj media (Opcjonalne):
                        <input type="file" name="media_file" accept="image/*,video/*">
                    </label>
                </div>

                <label>Wgraj ścieżkę dźwiękową (Opcjonalne):
                    <input type="file" name="audio_file" accept="audio/*">
                </label>

                <div class="yt-box">
                    <label><strong>Lub dodaj audio z YouTube (Opcjonalne):</strong>
                        <div class="grid">
                            <input type="url" name="youtube_url" id="yt-url" placeholder="Tutaj wklej link do filmiku (e.g. https://youtu.be/...)">
                            <input type="number" name="youtube_start" id="yt-start" placeholder="Czas rozpoczęcia (w sekundach)" min="0" value="0">
                        </div>
                        <button type="button" id="test-yt-btn" class="secondary outline" style="width: auto; margin-top: 10px;">▶️ Sprawdź audio</button>
                        <br><small><em>Przed dodaniem pytania sprawdź dźwięk, aby upewnić się, że YouTube nie zablokuje go ze względu na prawa autorskie.</em></small>
                    </label>
                </div>

                <hr>
                <h4>Odpowiedzi <small>(Zaznacz wszystkie poprawne. Leave C & D blank for a 2-option question)</small></h4>
                <div class="grid">
                    <label><input type="checkbox" name="correct_opt" value="A"> Poprawne
                        <input type="text" name="opt_a" placeholder="Option A" required>
                    </label>
                    <label><input type="checkbox" name="correct_opt" value="B"> Poprawne
                        <input type="text" name="opt_b" placeholder="Option B" required>
                    </label>
                </div>
                <div class="grid">
                    <label><input type="checkbox" name="correct_opt" value="C"> Poprawne
                        <input type="text" name="opt_c" placeholder="Option C (Optional)">
                    </label>
                    <label><input type="checkbox" name="correct_opt" value="D"> Poprawne
                        <input type="text" name="opt_d" placeholder="Option D (Optional)">
                    </label>
                </div>

                <button type="submit">Dodaj Pytanie</button>
                <p id="question-msg" style="color: green;"></p>
            </form>
        </div>
        <div class="card">
            <h3>3. Manage Existing Quizzes</h3>
            <div class="grid">
                <label>Select Quiz to Manage:
                    <select id="manage-quiz-select"></select>
                </label>
                <button type="button" onclick="loadQuizManager()" class="secondary" style="margin-top: 30px;">Load Quiz Details</button>
            </div>

            <div id="manage-area" style="display: none; margin-top: 20px; background: rgba(0,0,0,0.02); padding: 15px; border-radius: 5px; border: 1px solid #ddd;">
                <div class="grid">
                    <label>Rename Quiz:
                        <input type="text" id="edit-quiz-name">
                    </label>
                    <button type="button" onclick="renameQuiz()" style="margin-top: 30px;">Save Name</button>
                    <button type="button" onclick="deleteQuiz()" style="margin-top: 30px; background-color: #dc3545; border-color: #dc3545;">⚠️ Delete Entire Quiz</button>
                </div>

                <hr>
                <h4>Questions in this Quiz</h4>
                <div id="manage-questions-list"></div>
            </div>
        </div>
    </main>

    <script>
        // --- QUIZ LOADING & SUBMISSION LOGIC ---
        function loadQuizzes() {
            fetch('/api/quizzes')
                .then(res => res.json())
                .then(quizzes => {
                    const select1 = document.getElementById('quiz-select');
                    const select2 = document.getElementById('manage-quiz-select');
                    select1.innerHTML = '';
                    select2.innerHTML = '';
                    quizzes.forEach(q => {
                        select1.innerHTML += `<option value="${q.id}">${q.name}</option>`;
                        select2.innerHTML += `<option value="${q.id}">${q.name}</option>`;
                    });
                });
        }
        loadQuizzes();

        document.getElementById('create-quiz-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('quiz-name').value);
            fetch('/api/quizzes', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    document.getElementById('quiz-msg').innerText = "Quiz created successfully!";
                    document.getElementById('quiz-name').value = '';
                    loadQuizzes();
                });
        });

        document.getElementById('add-question-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const msgBox = document.getElementById('question-msg');

            // NEW: Validation to ensure at least one checkbox is checked
            if (formData.getAll('correct_opt').length === 0) {
                msgBox.style.color = "red";
                msgBox.innerText = "⚠️ Please check the box next to at least one correct answer.";
                return;
            }

            msgBox.innerText = "Checking media and saving...";
            msgBox.style.color = "orange";

            fetch('/api/questions', { method: 'POST', body: formData })
                .then(res => res.json().then(data => ({status: res.status, body: data})))
                .then(resObj => {
                    if (resObj.status !== 200) {
                        msgBox.style.color = "red";
                        msgBox.innerText = "⚠️ " + resObj.body.message;
                    } else {
                        msgBox.style.color = "green";
                        msgBox.innerText = "✅ Question added successfully!";
                        this.reset();
                        if (testPlayer) { testPlayer.destroy(); testPlayer = null; isPlayingTest = false; document.getElementById('test-yt-btn').innerText = "▶️ Test Audio"; }
                        setTimeout(() => msgBox.innerText = "", 4000);
                    }
                })
                .catch(err => {
                    msgBox.style.color = "red";
                    msgBox.innerText = "⚠️ An unexpected error occurred.";
                });
        });

        // --- YOUTUBE TEST BUTTON LOGIC ---
        let testPlayer = null;
        let isPlayingTest = false;

        // Helper to extract YouTube ID from URL
        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        document.getElementById('test-yt-btn').addEventListener('click', function() {
            const url = document.getElementById('yt-url').value;
            const startSecs = document.getElementById('yt-start').value || 0;
            const btn = this;

            // If it's already playing, stop it
            if (isPlayingTest) {
                if (testPlayer) testPlayer.destroy();
                testPlayer = null;
                isPlayingTest = false;
                btn.innerText = "▶️ Sprawdź audio";
                return;
            }

            // Get the ID
            const videoId = getYouTubeId(url);
            if (!videoId) {
                alert("Najpierw wklej prawidłowy link do serwisu YouTube.");
                return;
            }

            // Start playing
            btn.innerText = "⏳ Ładowanie...";
            isPlayingTest = true;
            document.getElementById('yt-test-container').innerHTML = '<div id="hidden-test-player"></div>';

            testPlayer = new YT.Player('hidden-test-player', {
                height: '0',
                width: '0',
                videoId: videoId,
                playerVars: { 'autoplay': 1, 'controls': 0, 'start': startSecs, 'playsinline': 1 },
                events: {
                    'onReady': (event) => {
                        event.target.playVideo();
                        btn.innerText = "⏹️ Zatrzymaj Audio";
                    },
                    'onError': (event) => {
                        let errorMsg = "YouTube zablokował odtwarzanie tego konkretnego filmu w zewnętrznych aplikacjach.";
                        if (event.data === 101 || event.data === 150) {
                            errorMsg = "Właściciel wyłączył osadzanie. Proszę użyć innego linku lub wgrać dźwięk z komputera";
                        }
                        alert("⚠️ Audio Error: " + errorMsg + "\n\nTen film NIE będzie działał w quizie.");

                        btn.innerText = "▶️ Sprawdź audio";
                        isPlayingTest = false;
                        if (testPlayer) testPlayer.destroy();
                    }
                }
            });
        });
        // --- NEW: QUIZ MANAGER LOGIC ---
        let currentManageQuizId = null;

        function loadQuizManager() {
            const quizId = document.getElementById('manage-quiz-select').value;
            if (!quizId) return;
            currentManageQuizId = quizId;

            // Set the name input
            const quizName = document.getElementById('manage-quiz-select').options[document.getElementById('manage-quiz-select').selectedIndex].text;
            document.getElementById('edit-quiz-name').value = quizName;

            // Fetch questions
            fetch(`/api/admin/quiz/${quizId}`)
                .then(res => res.json())
                .then(questions => {
                    const list = document.getElementById('manage-questions-list');
                    list.innerHTML = '';
                    if (questions.length === 0) {
                        list.innerHTML = "<em>No questions in this quiz yet.</em>";
                    } else {
                        questions.forEach((q, index) => {
                            list.innerHTML += `
                                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding: 10px 0;">
                                    <div>
                                        <strong>Q${index + 1}:</strong> ${q.question_text} <br>
                                        <small style="color: green;">Correct Answer(s): ${q.correct_opt}</small>
                                    </div>
                                    <button type="button" onclick="deleteQuestion(${q.id})" class="outline" style="width: auto; padding: 5px 15px; color: #dc3545; border-color: #dc3545;">Delete</button>
                                </div>
                            `;
                        });
                    }
                    document.getElementById('manage-area').style.display = 'block';
                });
        }

        function renameQuiz() {
            const newName = document.getElementById('edit-quiz-name').value;
            fetch(`/api/admin/quiz/${currentManageQuizId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName })
            }).then(() => {
                alert("Quiz renamed!");
                loadQuizzes();
                setTimeout(() => document.getElementById('manage-quiz-select').value = currentManageQuizId, 500);
            });
        }

        function deleteQuiz() {
            if (confirm("Are you sure? This will delete the quiz and ALL its questions permanently.")) {
                fetch(`/api/admin/quiz/${currentManageQuizId}`, { method: 'DELETE' })
                    .then(() => {
                        alert("Quiz deleted.");
                        document.getElementById('manage-area').style.display = 'none';
                        loadQuizzes();
                    });
            }
        }

        function deleteQuestion(qId) {
            if (confirm("Delete this question?")) {
                fetch(`/api/questions/${qId}`, { method: 'DELETE' })
                    .then(() => loadQuizManager()); // Refresh list
            }
        }
    </script>
</body>
</html>
